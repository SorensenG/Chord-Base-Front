<svg width="1920" height="1380" viewBox="0 0 1920 1380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1117"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#17212a"/>
      <stop offset="1" stop-color="#0f171e"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff6a57"/>
      <stop offset="1" stop-color="#f04438"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#31d6c6"/>
      <stop offset="1" stop-color="#0ea5a4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #f7fafc; letter-spacing: 0; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #9aa7b2; letter-spacing: 0; }
      .h1 { font: 800 26px Inter, Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .h2 { font: 700 18px Inter, Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .body { font: 500 14px Inter, Arial, sans-serif; fill: #9aa7b2; letter-spacing: 0; }
      .small { font: 600 12px Inter, Arial, sans-serif; fill: #7e8b96; letter-spacing: 0; }
      .tab { font: 700 11px Inter, Arial, sans-serif; fill: #6f7d88; letter-spacing: 0; }
      .tabActive { font: 800 11px Inter, Arial, sans-serif; fill: #31d6c6; letter-spacing: 0; }
      .button { font: 800 15px Inter, Arial, sans-serif; fill: #0b1117; letter-spacing: 0; }
      .chip { font: 700 12px Inter, Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1920" height="1380" fill="url(#bg)"/>
  <text x="80" y="86" class="title">ChordBase design board</text>
  <text x="80" y="122" class="subtitle">Mobile iOS/Android + Web direction using the chosen C chord identity</text>

  <g transform="translate(80 170)">
    <rect width="360" height="170" rx="28" fill="url(#surface)" stroke="#263541"/>
    <text x="28" y="42" class="h2">Visual identity</text>
    <text x="28" y="70" class="body">Core mark: C + chord diagram</text>
    <circle cx="54" cy="114" r="18" fill="#101820" stroke="#263541"/>
    <circle cx="102" cy="114" r="18" fill="#ff5a4d"/>
    <circle cx="150" cy="114" r="18" fill="#19c7ba"/>
    <circle cx="198" cy="114" r="18" fill="#f6b83f"/>
    <circle cx="246" cy="114" r="18" fill="#248cf0"/>
    <text x="28" y="154" class="small">Ink, coral, teal, warm accent, blue state</text>
  </g>

  <g transform="translate(480 170)">
    <rect width="360" height="170" rx="28" fill="url(#surface)" stroke="#263541"/>
