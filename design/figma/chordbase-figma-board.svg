    <text x="28" y="70" class="body">Mobile: bottom tabs</text>
    <text x="28" y="96" class="body">Web: left sidebar + content grid</text>
    <text x="28" y="132" class="small">Home, Cifras, Setlists, Perfil</text>
  </g>

  <g transform="translate(880 170)">
